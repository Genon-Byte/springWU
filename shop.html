<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/style.css">
  <title>Shop</title>
</head>
<body>
<div id="Shop">
<header>
    <nav id="navigation">
      <a href="index.html" class="interactable_title"><h2>Klätterlabbet</h2></a>
      <a href="aboutus.html" class="interactable"><h3>About us</h3></a>
      <a href="climbingcards.html" class="interactable"><h3>Climbing cards</h3></a>
      <a href="shop.html" class="interactable"><h3>Shop</h3></a>
    </nav>
  </header>
  <section id="Sc1"></section>
  <section id="Sc2" class="fade-img"></section>
  <section id="Sc3"></section>
  <section id="Sc4" class="fade-img"></section>
  <section id="Sc5"></section>
  <section id="Sc6" class="fade-img"></section>
  <section id="Sc7"></section>
  <div class="slideshow-container">

  <!-- Full-width images with number and caption text -->
  <div class="mySlides fade">
    <div class="numbertext">1 / 3</div>
    <img src="img/chalk photoshopped.jpg" style="width:100%">
    <div class="text">Caption Text</div>
  </div>

  <div class="mySlides fade">
    <div class="numbertext">2 / 3</div>
    <img src="img/Concet_Climbing_Solution_Hangboard_.jpg" style="width:100%">
    <div class="text">Caption Two</div>
  </div>

  <div class="mySlides fade">
    <div class="numbertext">3 / 3</div>
    <img src="img/Climbing shoes photoshopped.jpg" style="width:100%">
    <div class="text">Caption Three</div>
  </div>

  <!-- Next and previous buttons -->
  <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
  <a class="next" onclick="plusSlides(1)">&#10095;</a>
</div>
<br>

<!-- The dots/circles -->
<div style="text-align:center">
  <span class="dot" onclick="currentSlide(1)"></span>
  <span class="dot" onclick="currentSlide(2)"></span>
  <span class="dot" onclick="currentSlide(3)"></span>
</div>
</div>
</body>
<script>
const elements = document.querySelectorAll('.fade-img');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
}, {
  threshold: 0.2
});

elements.forEach(el => observer.observe(el));
</script>
</html>
